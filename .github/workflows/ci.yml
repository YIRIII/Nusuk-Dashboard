name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-lint:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # tsc -b at the root should handle project-reference ordering, but on
      # fresh CI runners it silently skipped schemas emit, leading to TS2307
      # "Cannot find module '@hadaq/schemas'" in downstream projects. Forcing
      # schemas to build first makes the typecheck step deterministic.
      - name: Build @hadaq/schemas
        working-directory: schemas
        run: npx tsc -b --force
      - run: npm run typecheck
      - run: npm run lint

  docker-multiarch:
    name: Docker Multi-arch Build (arm64 + amd64)
    runs-on: ubuntu-latest
    needs: typecheck-lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build (no push) — verifies ARM64 parity with prod
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/arm64,linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build args / tags kept minimal; CI is a parity check, not a registry push.
          tags: hadaq-api:ci
